<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0d0d1a">
<link rel="manifest" href="manifest.json">
<title>Monte Rosa Training Hub</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Serif+Display&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --bg:#0d0d1a;--bg2:#12122a;--bg3:rgba(255,255,255,.03);--bg4:rgba(255,255,255,.06);
  --teal:#4ECDC4;--red:#FF6B6B;--orange:#FF8C42;--green:#95E1D3;--yellow:#FFE66D;
  --purple:#C3ACD0;--blue:#A8D8EA;--white:#e8e8e8;--muted:rgba(255,255,255,.4);
  --faint:rgba(255,255,255,.06);--safe-top:env(safe-area-inset-top,0px);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--white);min-height:100vh;
  min-height:100dvh;padding-top:var(--safe-top);overflow-x:hidden}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:4px}
button{font-family:inherit;cursor:pointer}
input,textarea,select{font-family:inherit}

.app{max-width:820px;margin:0 auto;padding:0 16px 90px}

/* Header */
.header{padding:20px 0 12px;display:flex;align-items:center;justify-content:space-between}
.logo{font-size:24px;font-weight:800;font-family:'DM Serif Display',Georgia,serif}
.logo .r{color:var(--red)}.logo .b{color:var(--teal)}
.subtitle{font-size:10px;text-transform:uppercase;letter-spacing:3px;color:var(--muted);font-weight:600}
.hinfo{font-size:11px;color:var(--muted);text-align:right;line-height:1.5}

/* Bottom nav */
.bnav{position:fixed;bottom:0;left:0;right:0;background:rgba(13,13,26,.95);backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);border-top:1px solid var(--faint);display:flex;justify-content:center;
  padding:8px 0 max(8px,env(safe-area-inset-bottom,8px));z-index:100}
.bnav-inner{display:flex;gap:0;max-width:500px;width:100%}
.bnav button{flex:1;background:none;border:none;color:var(--muted);display:flex;flex-direction:column;
  align-items:center;gap:2px;padding:6px 4px;font-size:10px;font-weight:600;transition:all .15s}
.bnav button.active{color:var(--teal)}
.bnav button .bi{font-size:20px;line-height:1}

/* Tabs strip (for sub-tabs) */
.tabs{display:flex;gap:4px;margin-bottom:16px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px}
.tab{padding:7px 14px;border-radius:8px;border:none;font-size:12px;font-weight:600;white-space:nowrap;
  background:var(--bg3);color:var(--muted);transition:all .15s}
.tab.active{background:rgba(78,205,196,.15);color:var(--teal)}

/* Countdown */
.cd{background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);border-radius:16px;
  padding:24px;color:#fff;position:relative;overflow:hidden;margin-bottom:16px}
.cd::after{content:'';position:absolute;top:-40px;right:-40px;width:200px;height:200px;
  background:radial-gradient(circle,rgba(255,107,107,.15) 0%,transparent 70%);border-radius:50%}
.cd-label{font-size:12px;text-transform:uppercase;letter-spacing:3px;color:var(--teal);font-weight:700;margin-bottom:4px}
.cd-title{font-size:20px;font-weight:800;margin-bottom:2px;font-family:'DM Serif Display',Georgia,serif}
.cd-sub{font-size:13px;color:rgba(255,255,255,.5);margin-bottom:16px}
.cd-stats{display:flex;gap:12px;flex-wrap:wrap;position:relative;z-index:1}
.cd-s{background:rgba(255,255,255,.08);border-radius:10px;padding:10px 16px;min-width:70px;text-align:center}
.cd-s .v{font-size:24px;font-weight:800;font-family:'DM Mono',monospace}
.cd-s .l{font-size:10px;color:rgba(255,255,255,.45);text-transform:uppercase;letter-spacing:1px}
.cd-s.hl .v{color:var(--red)}

/* Cards */
.card{background:var(--bg3);border:1px solid var(--faint);border-radius:14px;padding:18px;margin-bottom:12px}
.card.cur{background:rgba(78,205,196,.06);border:2px solid rgba(78,205,196,.25)}
.card-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.badge{font-size:11px;text-transform:uppercase;letter-spacing:2px;font-weight:700}
.badge.t{color:var(--teal)}.badge.r{color:var(--red)}.badge.o{color:var(--orange)}
.card-t{font-size:17px;font-weight:700;margin-top:2px}
.card-d{font-size:12px;color:var(--muted)}
.pills{display:flex;gap:8px}
.pill{border-radius:8px;padding:5px 11px;text-align:center}
.pill .pv{font-size:17px;font-weight:800}.pill .pl{font-size:9px;color:var(--muted);text-transform:uppercase}
.pill.km{background:rgba(78,205,196,.1)}.pill.km .pv{color:var(--teal)}
.pill.dp{background:rgba(255,107,107,.1)}.pill.dp .pv{color:var(--red)}

/* Day grid */
.dgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
@media(max-width:520px){.dgrid{grid-template-columns:repeat(4,1fr)}}
.dc{background:var(--bg3);border:1px solid rgba(255,255,255,.03);border-radius:10px;padding:8px 6px;
  text-align:center;transition:all .2s;cursor:pointer}
.dc:hover{background:rgba(255,255,255,.06)}
.dc.today{background:rgba(255,107,107,.12);border-color:rgba(255,107,107,.35)}
.dc.tmr{background:rgba(255,140,66,.08);border-color:rgba(255,140,66,.25)}
.dc.past{opacity:.35}
.dc-l{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:3px;color:var(--muted)}
.dc.today .dc-l{color:var(--red)}.dc.tmr .dc-l{color:var(--orange)}
.dc-i{font-size:15px;margin-bottom:3px}
.dc-t{font-size:9px;font-weight:600;color:var(--white);line-height:1.3;min-height:24px}
.dc-k{font-size:8px;color:var(--muted);margin-top:2px}

/* Section labels */
.sl{font-size:12px;text-transform:uppercase;letter-spacing:2px;font-weight:700;margin-bottom:12px}
.sl.t{color:var(--teal)}.sl.o{color:var(--orange)}.sl.p{color:var(--purple)}.sl.r{color:var(--red)}

/* Session rows */
.sr{display:flex;gap:12px;align-items:flex-start;padding:11px 0;border-top:1px solid var(--faint)}
.sr:first-child{border-top:none}
.si{width:40px;height:40px;border-radius:9px;display:flex;align-items:center;justify-content:center;
  font-size:20px;flex-shrink:0}
.sm{flex:1;min-width:0}
.sm-d{font-size:10px;color:var(--muted);font-weight:600}
.sm-n{font-size:14px;font-weight:700;margin:2px 0}
.sm-desc{font-size:12px;color:rgba(255,255,255,.45);line-height:1.4}
.tg{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:600;display:inline-block;margin-right:5px;margin-top:5px}
.tg.km{background:rgba(78,205,196,.12);color:var(--teal)}
.tg.dp{background:rgba(255,107,107,.12);color:var(--red)}

/* Plan rows */
.pr{display:grid;grid-template-columns:52px 1fr 80px 48px 56px;align-items:center;gap:6px;
  padding:9px 12px;border-radius:10px;cursor:pointer;transition:all .12s;border:1px solid transparent;font-size:12px}
@media(max-width:500px){.pr{grid-template-columns:44px 1fr 50px 44px}}
.pr:hover{background:rgba(255,255,255,.04)}
.pr.cur{background:rgba(255,107,107,.06);border-color:rgba(255,107,107,.18)}
.pr.sel{background:rgba(78,205,196,.1);border-color:rgba(78,205,196,.25)}
.pr.past{opacity:.35}
.pr-w{font-weight:700}.pr-p{font-weight:600;color:var(--white)}.pr-d{font-size:10px;color:var(--muted)}
.pr-bar{height:5px;border-radius:3px;background:rgba(255,255,255,.04);overflow:hidden}
.pr-bf{height:100%;border-radius:3px}
.pr-km{color:var(--teal);font-weight:600;text-align:right}
.pr-dp{color:var(--red);font-weight:600;text-align:right}

/* Charts */
.cc{height:230px;margin-bottom:24px;position:relative}

/* Nutrition */
.ntabs{display:flex;gap:5px;margin-bottom:16px;flex-wrap:wrap}
.nt{padding:7px 14px;border-radius:8px;border:none;font-size:11px;font-weight:600;
  background:var(--bg3);color:var(--muted);transition:all .15s}
.nt.active{background:rgba(78,205,196,.18);color:var(--teal)}
.mgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
@media(max-width:420px){.mgrid{grid-template-columns:repeat(2,1fr)}}
.mc{border-radius:10px;padding:10px 6px;text-align:center}
.mc .mv{font-size:20px;font-weight:800}.mc .ml{font-size:9px;color:var(--muted)}
.mbar{display:flex;gap:3px;height:8px;border-radius:4px;overflow:hidden;margin-bottom:16px}
.meal{background:var(--bg3);border:1px solid var(--faint);border-radius:10px;padding:12px;margin-bottom:5px}
.meal-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.meal-n{font-size:13px;font-weight:700}.meal-tm{font-size:11px;color:var(--muted);margin-left:6px}
.meal-kc{font-size:12px;font-weight:700;color:var(--orange)}
.meal-it{font-size:12px;color:rgba(255,255,255,.45);line-height:1.4;margin-bottom:5px}
.meal-ms{display:flex;gap:6px;flex-wrap:wrap}
.mt{font-size:9px;padding:2px 5px;border-radius:3px}
.mt.p{background:rgba(78,205,196,.12);color:var(--teal)}
.mt.c{background:rgba(255,230,109,.12);color:var(--yellow)}
.mt.f{background:rgba(255,107,107,.12);color:var(--red)}

/* Race rows */
.rr{display:grid;grid-template-columns:65px 1fr 58px 78px 50px;align-items:center;gap:6px;
  padding:7px 10px;background:var(--bg3);border-radius:8px;font-size:12px;margin-bottom:3px}
@media(max-width:500px){.rr{grid-template-columns:55px 1fr 50px}.rr .rd,.rr .rt{display:none}}
.rdt{color:var(--muted)}.rn{color:var(--white);font-weight:600}
.rk{color:var(--teal)}.rd{color:var(--red)}.rt{color:var(--muted)}

/* Photo nutrition */
.photo-zone{border:2px dashed rgba(78,205,196,.3);border-radius:14px;padding:30px;text-align:center;
  cursor:pointer;transition:all .2s;margin-bottom:16px}
.photo-zone:hover{border-color:var(--teal);background:rgba(78,205,196,.04)}
.photo-zone .pz-icon{font-size:40px;margin-bottom:8px}
.photo-zone .pz-text{font-size:13px;color:var(--muted)}
.photo-preview{max-width:100%;max-height:200px;border-radius:10px;margin:12px auto;display:block}
.analyzing{text-align:center;padding:20px;color:var(--teal);font-size:14px}
.analyzing .spinner{display:inline-block;width:20px;height:20px;border:2px solid var(--teal);
  border-top-color:transparent;border-radius:50%;animation:spin .8s linear infinite;margin-right:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}

/* Journal entries */
.je{background:var(--bg3);border:1px solid var(--faint);border-radius:12px;padding:14px;margin-bottom:8px;
  display:flex;gap:12px;align-items:flex-start}
.je-img{width:60px;height:60px;border-radius:8px;object-fit:cover;flex-shrink:0}
.je-info{flex:1;min-width:0}
.je-time{font-size:10px;color:var(--muted)}
.je-name{font-size:14px;font-weight:700;margin:2px 0}
.je-macros{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}
.je-del{background:none;border:none;color:var(--muted);font-size:16px;padding:4px;cursor:pointer}
.je-del:hover{color:var(--red)}

/* Edit modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:center;
  justify-content:center;padding:20px;backdrop-filter:blur(4px)}
.modal{background:var(--bg2);border:1px solid var(--faint);border-radius:16px;padding:24px;
  width:100%;max-width:440px;max-height:90vh;overflow-y:auto}
.modal h3{font-size:16px;font-weight:700;margin-bottom:16px;color:var(--white)}
.modal label{display:block;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;
  margin-bottom:4px;margin-top:12px}
.modal input,.modal textarea,.modal select{width:100%;padding:10px 12px;border-radius:8px;border:1px solid var(--faint);
  background:var(--bg3);color:var(--white);font-size:14px;outline:none}
.modal input:focus,.modal textarea:focus{border-color:rgba(78,205,196,.4)}
.modal textarea{resize:vertical;min-height:60px}
.modal-btns{display:flex;gap:8px;margin-top:20px}
.btn{padding:10px 20px;border-radius:8px;border:none;font-size:13px;font-weight:600;transition:all .15s}
.btn-primary{background:var(--teal);color:#0d0d1a}.btn-primary:hover{background:#3dbdb5}
.btn-secondary{background:var(--bg3);color:var(--muted)}.btn-secondary:hover{background:var(--bg4)}
.btn-danger{background:rgba(255,107,107,.15);color:var(--red)}

/* Notification settings */
.notif-card{background:var(--bg3);border:1px solid var(--faint);border-radius:12px;padding:16px;margin-bottom:10px;
  display:flex;justify-content:space-between;align-items:center}
.notif-info{flex:1}
.notif-title{font-size:14px;font-weight:600;color:var(--white)}
.notif-desc{font-size:12px;color:var(--muted);margin-top:2px}
.toggle{position:relative;width:48px;height:26px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.toggle .slider{position:absolute;inset:0;background:rgba(255,255,255,.1);border-radius:13px;
  cursor:pointer;transition:.2s}
.toggle .slider::before{content:'';position:absolute;width:20px;height:20px;left:3px;bottom:3px;
  background:var(--muted);border-radius:50%;transition:.2s}
.toggle input:checked+.slider{background:rgba(78,205,196,.3)}
.toggle input:checked+.slider::before{transform:translateX(22px);background:var(--teal)}

/* Daily total */
.dtotal{background:rgba(255,140,66,.08);border:1px solid rgba(255,140,66,.15);border-radius:12px;
  padding:14px;margin-bottom:16px;display:flex;justify-content:space-around;text-align:center}
.dtotal .dt-v{font-size:20px;font-weight:800}.dtotal .dt-l{font-size:9px;color:var(--muted);text-transform:uppercase}

.hidden{display:none !important}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .3s ease}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="header">
    <div>
      <div class="logo"><span class="r">Monte</span> <span class="b">Rosa</span></div>
      <div class="subtitle">Training Hub</div>
    </div>
    <div class="hinfo">SDV 120K • 8200m D+<br>17 juillet 2026</div>
  </div>
  <div id="content"></div>
</div>

<!-- Bottom Navigation -->
<nav class="bnav">
  <div class="bnav-inner">
    <button onclick="go('dash')" id="nav-dash" class="active"><span class="bi">📋</span>Dashboard</button>
    <button onclick="go('plan')" id="nav-plan"><span class="bi">🗓️</span>Plan</button>

</nav>

function daysLeft(){return Math.ceil((RACE_DATE-new Date())/(864e5))}
function curWeekIdx(){
  const now=new Date();
  for(let i=plan.length-1;i>=0;i--){
    const p=plan[i].dates.split(" – ")[0].split("/");
    if(now>=new Date(2026,parseInt(p[1])-1,parseInt(p[0]))) return i;
  }
  return 0;
}
function wKm(w){return D.reduce((s,d)=>s+(w[d]?.km||0),0)}
function wDp(w){return D.reduce((s,d)=>s+(w[d]?.dplus||0),0)}
function todayIdx(){const d=new Date().getDay();return d===0?6:d-1}
function dateStr(){return new Date().toISOString().split('T')[0]}

function go(tab){
  currentTab=tab;
  document.querySelectorAll('.bnav button').forEach(b=>b.classList.remove('active'));
  document.getElementById('nav-'+tab)?.classList.add('active');
  render();
}

function render(){
  const el=document.getElementById('content');
  Object.values(charts).forEach(c=>{try{c.destroy()}catch{}});charts={};
  if(currentTab==='dash') el.innerHTML=renderDash();
  else if(currentTab==='plan') el.innerHTML=renderPlan();
  else if(currentTab==='nutri') el.innerHTML=renderNutri();
  else if(currentTab==='progress') el.innerHTML=renderProgress();
  else if(currentTab==='settings') el.innerHTML=renderSettings();
  // Post-render charts
  if(currentTab==='progress') initCharts();
}

// ─── DASHBOARD ───────────────────────────────────────────────────

function renderDash(){
  const dl=daysLeft(),wl=Math.floor(dl/7),ci=curWeekIdx(),cw=plan[ci],nw=plan[ci+1];
  let h=`<div class="cd">
    <div class="cd-label">Objectif</div>
    <div class="cd-title">${RACE.name}</div>
    <div class="cd-sub">${RACE.loc} • ${RACE.date} • Départ ${RACE.start}</div>
    <div class="cd-stats">
      <div class="cd-s hl"><div class="v">${dl}</div><div class="l">jours</div></div>
      <div class="cd-s"><div class="v">${wl}</div><div class="l">semaines</div></div>
      <div class="cd-s"><div class="v">${RACE.km}km</div><div class="l">distance</div></div>
      <div class="cd-s"><div class="v">${RACE.dplus}m</div><div class="l">D+</div></div>
    </div></div>`;
  h+=weekCard(cw,true);
  h+=sessionDetail(cw);
  if(nw) h+=weekCard(nw,false);
  return h;
}

function weekCard(w,isCur){
  const ti=todayIdx(),tk=wKm(w),td=wDp(w);
  let h=`<div class="card ${isCur?'cur':''}"><div class="card-h"><div>
    <div class="badge ${isCur?'t':'r'}">${isCur?'Cette semaine':'Semaine prochaine'}</div>
    <div class="card-t">${w.week} — ${w.phase}</div>
    <div class="card-d">${w.dates}</div></div>
    <div class="pills"><div class="pill km"><div class="pv">${tk}</div><div class="pl">km</div></div>
    <div class="pill dp"><div class="pv">${td}</div><div class="pl">D+</div></div></div></div>
    <div class="dgrid">`;
  D.forEach((d,i)=>{
    const s=w[d];if(!s)return;
    const isT=isCur&&i===ti,isTm=isCur&&i===ti+1,isP=isCur&&i<ti;
    const cls=isT?'today':isTm?'tmr':isP?'past':'';
    const lbl=isT?'Auj.':isTm?'Demain':DN[i];
    h+=`<div class="dc ${cls}" onclick="editSession('${w.week}','${d}')">
      <div class="dc-l">${lbl}</div><div class="dc-i">${SI[s.type]||'📋'}</div>
      <div class="dc-t">${s.title.length>22?s.title.substring(0,20)+'…':s.title}</div>
      ${s.km>0?`<div class="dc-k">${s.km}km</div>`:''}
    </div>`;
  });
  h+=`</div></div>`;return h;
}

function sessionDetail(w){
  const ti=todayIdx(),show=[ti,ti+1,ti+2].filter(i=>i<7);
  let h=`<div class="sl o">Détail des 3 prochains jours</div>`;
  show.forEach(i=>{
    const s=w[D[i]];if(!s)return;
    const col=SC[s.type]||'#999';
    const lbl=DF[i]+(i===ti?' — Aujourd\'hui':i===ti+1?' — Demain':'');
    h+=`<div class="sr"><div class="si" style="background:${col}22">${SI[s.type]||'📋'}</div>
      <div class="sm"><div class="sm-d">${lbl}</div><div class="sm-n">${s.title}</div>
      <div class="sm-desc">${s.desc}</div>
      <div>${s.km>0?`<span class="tg km">${s.km} km</span>`:''}${s.dplus>0?`<span class="tg dp">${s.dplus}m D+</span>`:''}</div></div></div>`;
  });
  return h;
}

function renderPlan(){
  const ci=curWeekIdx();
  let h=`<div class="sl t">Plan complet — 16 semaines</div>`;
  plan.forEach((w,idx)=>{
    const tk=wKm(w),isCur=idx===ci,isP=idx<ci,isSel=selWeek===idx;
    const cls=isSel?'sel':isCur?'cur':isP?'past':'';
    h+=`<div class="pr ${cls}" onclick="toggleWeek(${idx})">
      <div class="pr-w" style="color:${isCur?'var(--red)':'var(--white)'}">${w.week}</div>
      <div><div class="pr-p">${w.phase}</div><div class="pr-d">${w.dates}</div></div>
      <div class="pr-bar"><div class="pr-bf" style="width:${Math.min(100,tk/1.1)}%;background:${w.color}"></div></div>
      <div class="pr-km">${tk}km</div>
      <div class="pr-dp">${w.target_dplus||'—'}</div></div>`;
  });
  if(selWeek!==null) h+=weekDetail(plan[selWeek]);
  return h;
}

function weekDetail(w){
  let h=`<div class="card fade-in" style="margin-top:14px">
    <div class="card-h"><div><div class="card-t">${w.week} — ${w.phase}</div><div class="card-d">${w.dates}</div></div>
    <div class="pills"><div class="pill km"><div class="pv">${w.target_km}</div><div class="pl">TARGET KM</div></div>
    <div class="pill dp"><div class="pv">${w.target_dplus}</div><div class="pl">TARGET D+</div></div></div></div>`;
  D.forEach((d,i)=>{
    const s=w[d];if(!s)return;
    const col=SC[s.type]||'#999';
    h+=`<div class="sr" onclick="editSession('${w.week}','${d}')" style="cursor:pointer">
      <div class="si" style="background:${col}22;width:36px;height:36px;font-size:17px">${SI[s.type]||'📋'}</div>
      <div class="sm"><div class="sm-d">${DF[i]}</div><div class="sm-n" style="font-size:13px">${s.title}</div>
      <div class="sm-desc">${s.desc}</div></div>
      <div style="flex-shrink:0">${s.km>0?`<span class="tg km">${s.km}km</span>`:''}${s.dplus>0?`<span class="tg dp">${s.dplus}m</span>`:''}</div></div>`;
  });
  h+=`<div style="margin-top:12px;text-align:center">
    <button class="btn btn-secondary" onclick="resetWeek('${w.week}')" style="font-size:11px">↺ Réinitialiser cette semaine</button></div></div>`;
  return h;
}

function toggleWeek(idx){selWeek=selWeek===idx?null:idx;render()}

// ─── EDIT SESSION MODAL ──────────────────────────────────────────

function editSession(weekId,day){
  const wi=plan.findIndex(w=>w.week===weekId);
  if(wi<0)return;
  const w=plan[wi],s=w[day];if(!s)return;
  const di=D.indexOf(day);
  let typeOpts=TYPES.map(t=>`<option value="${t}" ${t===s.type?'selected':''}>${SI[t]} ${t}</option>`).join('');
  const modal=document.createElement('div');
  modal.className='modal-bg';
  modal.innerHTML=`<div class="modal">
    <h3>${SI[s.type]} ${DF[di]} — ${w.week}</h3>
    <label>Type</label><select id="ed-type">${typeOpts}</select>
    <label>Titre</label><input id="ed-title" value="${s.title.replace(/"/g,'&quot;')}">
    <label>Description</label><textarea id="ed-desc">${s.desc}</textarea>
    <label>Distance (km)</label><input id="ed-km" type="number" step="0.1" value="${s.km}">
    <label>Dénivelé (m D+)</label><input id="ed-dp" type="number" step="10" value="${s.dplus}">
    <div class="modal-btns">
      <button class="btn btn-primary" onclick="saveEdit('${weekId}','${day}')">Sauvegarder</button>
      <button class="btn btn-secondary" onclick="closeModal()">Annuler</button>
    </div></div>`;
  modal.addEventListener('click',e=>{if(e.target===modal)closeModal()});
  document.body.appendChild(modal);
  editModal=modal;
}

function saveEdit(weekId,day){
  const wi=plan.findIndex(w=>w.week===weekId);
  if(wi<0)return;
  plan[wi][day]={
    type:document.getElementById('ed-type').value,
    title:document.getElementById('ed-title').value,
    desc:document.getElementById('ed-desc').value,
    km:parseFloat(document.getElementById('ed-km').value)||0,
    dplus:parseFloat(document.getElementById('ed-dp').value)||0
  };
  savePlan();closeModal();render();
}

function closeModal(){if(editModal){editModal.remove();editModal=null}}

function resetWeek(weekId){
  const wi=plan.findIndex(w=>w.week===weekId);
  const di=DEFAULT_PLAN.findIndex(w=>w.week===weekId);
  if(wi>=0&&di>=0){
    plan[wi]=JSON.parse(JSON.stringify(DEFAULT_PLAN[di]));
    savePlan();render();
  }
}

// ─── NUTRITION + PHOTO ───────────────────────────────────────────

function renderNutri(){
  const today=dateStr();
  const todayEntries=journal.filter(j=>j.date===today);
  const totals=todayEntries.reduce((a,j)=>({kcal:a.kcal+j.kcal,p:a.p+j.p,c:a.c+j.c,f:a.f+j.f}),{kcal:0,p:0,c:0,f:0});

  let h=`<div class="sl o">📸 Scanner un repas</div>
    <div class="photo-zone" onclick="document.getElementById('photo-input').click()">

        <div><div class="dt-v" style="color:var(--yellow)">${totals.c}g</div><div class="dt-l">glucides</div></div>
        <div><div class="dt-v" style="color:var(--red)">${totals.f}g</div><div class="dt-l">lipides</div></div>
      </div>`;
    todayEntries.forEach((j,idx)=>{
      const ji=journal.indexOf(j);
      h+=`<div class="je">
        ${j.thumb?`<img class="je-img" src="${j.thumb}">`:''}
        <div class="je-info"><div class="je-time">${j.time}</div><div class="je-name">${j.name}</div>
        <div class="je-macros">
          <span class="mt p">P: ${j.p}g</span><span class="mt c">C: ${j.c}g</span><span class="mt f">F: ${j.f}g</span>
          <span style="font-size:10px;color:var(--orange);font-weight:700">${j.kcal} kcal</span>
        </div></div>
        <button class="je-del" onclick="delJournal(${ji})">×</button></div>`;
    });
  }

  h+=`<div class="sl p" style="margin-top:20px">Plans nutritionnels</div>
    <div class="ntabs">${Object.entries(NUTRI).map(([k,v])=>
      `<button class="nt ${k===nutriTab?'active':''}" onclick="switchNutri('${k}')">${v.label}</button>`
    ).join('')}</div>`;

  const n=NUTRI[nutriTab];
  h+=`<div class="mgrid">
    <div class="mc" style="background:rgba(255,140,66,.08)"><div class="mv" style="color:var(--orange)">${n.kcal}</div><div class="ml">kcal</div></div>
    <div class="mc" style="background:rgba(78,205,196,.08)"><div class="mv" style="color:var(--teal)">${n.p}g</div><div class="ml">Protéines</div></div>
    <div class="mc" style="background:rgba(255,230,109,.08)"><div class="mv" style="color:var(--yellow)">${n.c}g</div><div class="ml">Glucides</div></div>
    <div class="mc" style="background:rgba(255,107,107,.08)"><div class="mv" style="color:var(--red)">${n.f}g</div><div class="ml">Lipides</div></div></div>
    <div class="mbar"><div style="flex:${n.p*4};background:var(--teal);border-radius:4px"></div>
    <div style="flex:${n.c*4};background:var(--yellow);border-radius:4px"></div>
    <div style="flex:${n.f*9};background:var(--red);border-radius:4px"></div></div>`;
  n.meals.forEach(m=>{
    h+=`<div class="meal"><div class="meal-h"><div><span class="meal-n">${m.name}</span><span class="meal-tm">${m.time}</span></div>
      <span class="meal-kc">${m.kcal} kcal</span></div>
      <div class="meal-it">${m.items}</div>
      <div class="meal-ms">${m.p>0?`<span class="mt p">P:${m.p}g</span>`:''}${m.c>0?`<span class="mt c">C:${m.c}g</span>`:''}${m.f>0?`<span class="mt f">F:${m.f}g</span>`:''}</div></div>`;
  });
  return h;
}

function switchNutri(t){nutriTab=t;render()}

async function handlePhoto(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=async function(e){
    const base64=e.target.result;
    const resEl=document.getElementById('photo-result');
    resEl.innerHTML=`<img class="photo-preview" src="${base64}">
      <div class="analyzing"><span class="spinner"></span> Claude analyse ton assiette…</div>`;

    try{
      const imgData=base64.split(',')[1];
      const mediaType=file.type||'image/jpeg';
      const resp=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          model:'claude-sonnet-4-20250514',max_tokens:1000,
          messages:[{role:'user',content:[
            {type:'image',source:{type:'base64',media_type:mediaType,data:imgData}},
            {type:'text',text:`Analyse cette photo d'assiette/repas. Réponds UNIQUEMENT en JSON valide, sans markdown ni backticks:
{"name":"nom court du plat","kcal":nombre,"p":protéines_grammes,"c":glucides_grammes,"f":lipides_grammes,"items":"description courte des aliments identifiés"}
Estime au mieux les quantités visibles. Sois réaliste.`}
          ]}]
        })
      });
      const data=await resp.json();
      const text=data.content?.map(c=>c.text||'').join('')||'';
      const clean=text.replace(/```json|```/g,'').trim();
      const result=JSON.parse(clean);

      // Create thumbnail
      const canvas=document.createElement('canvas');
      const img=new Image();
      img.onload=function(){
        canvas.width=120;canvas.height=120;
        const ctx=canvas.getContext('2d');
        const size=Math.min(img.width,img.height);
        const sx=(img.width-size)/2,sy=(img.height-size)/2;
        ctx.drawImage(img,sx,sy,size,size,0,0,120,120);
        const thumb=canvas.toDataURL('image/jpeg',0.6);

        const entry={
          date:dateStr(),time:new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}),
          name:result.name,kcal:Math.round(result.kcal),p:Math.round(result.p),c:Math.round(result.c),f:Math.round(result.f),
          items:result.items,thumb
        };
        journal.push(entry);saveJournal();render();
      };
      img.src=base64;
    }catch(err){
      resEl.innerHTML=`<div style="color:var(--red);text-align:center;padding:16px">
        Erreur d'analyse. Ajoute manuellement:<br>
        <button class="btn btn-primary" onclick="manualEntry()" style="margin-top:10px">+ Ajouter manuellement</button></div>`;
    }
  };
  reader.readAsDataURL(file);
  input.value='';
}

function manualEntry(){
  const modal=document.createElement('div');
  modal.className='modal-bg';
  modal.innerHTML=`<div class="modal">
    <h3>🍽️ Ajouter un repas</h3>
    <label>Nom du plat</label><input id="me-name" placeholder="Ex: Poulet riz légumes">
    <label>Calories (kcal)</label><input id="me-kcal" type="number" placeholder="600">
    <label>Protéines (g)</label><input id="me-p" type="number" placeholder="40">
    <label>Glucides (g)</label><input id="me-c" type="number" placeholder="70">
    <label>Lipides (g)</label><input id="me-f" type="number" placeholder="20">
    <div class="modal-btns">
      <button class="btn btn-primary" onclick="saveManualEntry()">Ajouter</button>
      <button class="btn btn-secondary" onclick="closeModal()">Annuler</button></div></div>`;
  modal.addEventListener('click',e=>{if(e.target===modal)closeModal()});
  document.body.appendChild(modal);editModal=modal;
}

function saveManualEntry(){
  const entry={
    date:dateStr(),time:new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}),
    name:document.getElementById('me-name').value||'Repas',
    kcal:parseInt(document.getElementById('me-kcal').value)||0,
    p:parseInt(document.getElementById('me-p').value)||0,
    c:parseInt(document.getElementById('me-c').value)||0,
    f:parseInt(document.getElementById('me-f').value)||0,
    thumb:null
  };
  journal.push(entry);saveJournal();closeModal();render();
}

function delJournal(idx){journal.splice(idx,1);saveJournal();render()}

// ─── PROGRESS ────────────────────────────────────────────────────

function renderProgress(){
  let h=`<div class="sl t">Volume hebdomadaire — Historique Strava</div>
    <div class="cc"><canvas id="ch1"></canvas></div>
    <div class="sl o">Progression planifiée</div>
    <div class="cc"><canvas id="ch2"></canvas></div>
    <div class="sl p" style="margin-top:8px">Palmarès Ultra</div>`;
  RACES.forEach(r=>{
    h+=`<div class="rr"><span class="rdt">${r.date}</span><span class="rn">${r.name}</span>
      <span class="rk">${r.km}km</span><span class="rd">${r.dp}m D+</span><span class="rt">${r.time}</span></div>`;
  });
  return h;

function initCharts(){
  const ctx1=document.getElementById('ch1')?.getContext('2d');
  const ctx2=document.getElementById('ch2')?.getContext('2d');
  if(!ctx1||!ctx2)return;
  const cOpts={responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'rgba(255,255,255,.4)',font:{size:10}}}},
    scales:{x:{ticks:{color:'rgba(255,255,255,.25)',font:{size:9},maxRotation:45},grid:{color:'rgba(255,255,255,.04)'}},
    y:{ticks:{color:'rgba(255,255,255,.3)',font:{size:10}},grid:{color:'rgba(255,255,255,.04)'}}}};

  charts.h=new Chart(ctx1,{type:'bar',data:{labels:HIST.map(h=>h.w),datasets:[
    {label:'km',data:HIST.map(h=>h.km),backgroundColor:'rgba(78,205,196,.6)',borderRadius:3,order:2},
    {label:'D+ (m)',data:HIST.map(h=>h.dp),type:'line',borderColor:'#FF6B6B',borderWidth:2,pointRadius:0,tension:.3,order:1,yAxisID:'y1'}
  ]},options:{...cOpts,scales:{...cOpts.scales,y1:{position:'right',ticks:{color:'rgba(255,107,107,.4)',font:{size:10}},grid:{display:false}}}}});

  const pd=plan.map(w=>({l:w.week,km:wKm(w),dp:wDp(w)}));
  charts.p=new Chart(ctx2,{type:'bar',data:{labels:pd.map(d=>d.l),datasets:[
    {label:'km',data:pd.map(d=>d.km),backgroundColor:'rgba(78,205,196,.7)',borderRadius:3},
    {label:'D+ (m)',data:pd.map(d=>d.dp),backgroundColor:'rgba(255,107,107,.5)',borderRadius:3}
  ]},options:cOpts});
}

// ─── SETTINGS ────────────────────────────────────────────────────

function renderSettings(){
  let h=`<div class="sl t">Notifications</div>
    <div class="notif-card">
      <div class="notif-info"><div class="notif-title">Rappel quotidien</div>
        <div class="notif-desc">Reçois l'entraînement du lendemain chaque soir</div></div>
      <label class="toggle"><input type="checkbox" ${notifSettings.daily?'checked':''} onchange="toggleNotif('daily',this.checked)"><span class="slider"></span></label>
    </div>
    <div class="notif-card">
      <div class="notif-info"><div class="notif-title">Résumé hebdomadaire</div>
        <div class="notif-desc">Résumé de la semaine à venir chaque lundi</div></div>
      <label class="toggle"><input type="checkbox" ${notifSettings.weekly?'checked':''} onchange="toggleNotif('weekly',this.checked)"><span class="slider"></span></label>
    </div>
    <div class="notif-card">
      <div class="notif-info"><div class="notif-title">Heure du rappel</div>
        <div class="notif-desc">Heure de la notification quotidienne</div></div>
      <input type="time" value="${notifSettings.time}" onchange="notifSettings.time=this.value;saveNotif();scheduleNotifications()"
        style="background:var(--bg3);border:1px solid var(--faint);color:var(--white);border-radius:8px;padding:8px 12px;font-size:14px">
    </div>
    <div id="notif-status" style="margin-top:12px;font-size:12px;color:var(--muted);text-align:center"></div>

    <div class="sl r" style="margin-top:28px">Données</div>
    <div class="notif-card">
      <div class="notif-info"><div class="notif-title">Réinitialiser le plan</div>
        <div class="notif-desc">Remettre toutes les semaines aux valeurs par défaut</div></div>
      <button class="btn btn-danger" onclick="resetAllPlan()">Reset</button>
    </div>
    <div class="notif-card">
      <div class="notif-info"><div class="notif-title">Vider le journal nutrition</div>
        <div class="notif-desc">Supprimer tous les repas enregistrés</div></div>
      <button class="btn btn-danger" onclick="clearJournal()">Vider</button>
    </div>
    <div style="text-align:center;margin-top:32px;font-size:11px;color:rgba(255,255,255,.2)">
      Monte Rosa Training Hub v2.0<br>PWA • Données stockées localement</div>`;
  return h;
}

async function toggleNotif(type,val){
  notifSettings[type]=val;saveNotif();
  if(val){
    if('Notification' in window && Notification.permission!=='granted'){
      const perm=await Notification.requestPermission();
      if(perm!=='granted'){
        notifSettings[type]=false;saveNotif();render();
        return;
      }
    }
    scheduleNotifications();
  }
  const status=document.getElementById('notif-status');
  if(status) status.textContent=val?'✓ Notifications activées':'Notifications désactivées';
}

function scheduleNotifications(){
  if(!('serviceWorker' in navigator))return;
  navigator.serviceWorker.ready.then(reg=>{
    if(notifSettings.daily){
      const ci=curWeekIdx(),cw=plan[ci];
      const ti=todayIdx(),tomorrow=ti+1<7?ti+1:0;
      const s=cw[D[tomorrow]];
      if(s){
        const [h,m]=(notifSettings.time||'20:00').split(':').map(Number);
        const target=new Date();target.setHours(h,m,0,0);
        let delay=target-new Date();
        if(delay<0) delay+=864e5;
        reg.active?.postMessage({type:'SCHEDULE_NOTIFICATION',
          title:`🏔️ Demain: ${s.title}`,
          body:`${DF[tomorrow]} — ${s.desc}${s.km>0?' • '+s.km+'km':''}`,
          delay
        });
      }
    }
  });
}

function resetAllPlan(){
  if(confirm('Réinitialiser tout le plan aux valeurs par défaut?')){
    plan=JSON.parse(JSON.stringify(DEFAULT_PLAN));savePlan();render();
  }
}

function clearJournal(){
  if(confirm('Supprimer tout le journal nutrition?')){journal=[];saveJournal();render()}
}

// ═══════════════════════════════════════════════════════════════════
// PWA & INIT
// ═══════════════════════════════════════════════════════════════════

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js').then(()=>console.log('SW registered')).catch(console.error);
}

render();
scheduleNotifications();
</script>
