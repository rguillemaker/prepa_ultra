<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0d0d1a">
<link rel="manifest" href="manifest.json">
<title>Monte Rosa Training Hub</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Serif+Display&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{--bg:#0d0d1a;--bg2:#12122a;--bg3:rgba(255,255,255,.03);--bg4:rgba(255,255,255,.06);--teal:#4ECDC4;--red:#FF6B6B;--orange:#FF8C42;--green:#95E1D3;--yellow:#FFE66D;--purple:#C3ACD0;--blue:#A8D8EA;--white:#e8e8e8;--muted:rgba(255,255,255,.4);--faint:rgba(255,255,255,.06)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--white);min-height:100dvh;overflow-x:hidden}
button{font-family:inherit;cursor:pointer}input,textarea,select{font-family:inherit}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:4px}
.app{max-width:820px;margin:0 auto;padding:0 16px 90px}
.header{padding:20px 0 12px;display:flex;align-items:center;justify-content:space-between}
.logo{font-size:24px;font-weight:800;font-family:'DM Serif Display',Georgia,serif}
.logo .r{color:var(--red)}.logo .b{color:var(--teal)}
.subtitle{font-size:10px;text-transform:uppercase;letter-spacing:3px;color:var(--muted);font-weight:600}
.hinfo{font-size:11px;color:var(--muted);text-align:right;line-height:1.5}

/* Bottom nav */
.bnav{position:fixed;bottom:0;left:0;right:0;background:rgba(13,13,26,.95);backdrop-filter:blur(20px);border-top:1px solid var(--faint);display:flex;justify-content:center;padding:6px 0 max(6px,env(safe-area-inset-bottom));z-index:100}
.bnav-inner{display:flex;gap:0;max-width:500px;width:100%}
.bnav button{flex:1;background:none;border:none;color:var(--muted);display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 2px;font-size:9px;font-weight:600;transition:color .15s}
.bnav button.active{color:var(--teal)}
.bnav button .bi{font-size:20px;line-height:1}

/* Common */
.sl{font-size:12px;text-transform:uppercase;letter-spacing:2px;font-weight:700;margin-bottom:12px}
.sl.t{color:var(--teal)}.sl.o{color:var(--orange)}.sl.p{color:var(--purple)}.sl.r{color:var(--red)}.sl.g{color:var(--green)}
.card{background:var(--bg3);border:1px solid var(--faint);border-radius:14px;padding:18px;margin-bottom:12px}
.card.cur{background:rgba(78,205,196,.06);border:2px solid rgba(78,205,196,.25)}
.card-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.badge{font-size:11px;text-transform:uppercase;letter-spacing:2px;font-weight:700}
.badge.t{color:var(--teal)}.badge.r{color:var(--red)}.badge.o{color:var(--orange)}
.card-t{font-size:17px;font-weight:700;margin-top:2px}
.card-d{font-size:12px;color:var(--muted)}
.pills{display:flex;gap:8px}
.pill{border-radius:8px;padding:5px 11px;text-align:center}
.pill .pv{font-size:17px;font-weight:800}.pill .pl{font-size:9px;color:var(--muted);text-transform:uppercase}
.pill.km{background:rgba(78,205,196,.1)}.pill.km .pv{color:var(--teal)}
.pill.dp{background:rgba(255,107,107,.1)}.pill.dp .pv{color:var(--red)}
.tg{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:600;display:inline-block;margin-right:5px;margin-top:5px}
.tg.km{background:rgba(78,205,196,.12);color:var(--teal)}.tg.dp{background:rgba(255,107,107,.12);color:var(--red)}

/* Countdown */
.cd{background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);border-radius:16px;padding:24px;color:#fff;position:relative;overflow:hidden;margin-bottom:16px}
.cd::after{content:'';position:absolute;top:-40px;right:-40px;width:200px;height:200px;background:radial-gradient(circle,rgba(255,107,107,.15) 0%,transparent 70%);border-radius:50%}
.cd-label{font-size:12px;text-transform:uppercase;letter-spacing:3px;color:var(--teal);font-weight:700;margin-bottom:4px}
.cd-title{font-size:19px;font-weight:800;margin-bottom:2px;font-family:'DM Serif Display',Georgia,serif}
.cd-sub{font-size:12px;color:rgba(255,255,255,.5);margin-bottom:16px}
.cd-stats{display:flex;gap:10px;flex-wrap:wrap;position:relative;z-index:1}
.cd-s{background:rgba(255,255,255,.08);border-radius:10px;padding:10px 14px;min-width:65px;text-align:center}
.cd-s .v{font-size:22px;font-weight:800;font-family:'DM Mono',monospace}.cd-s .l{font-size:10px;color:rgba(255,255,255,.45);text-transform:uppercase;letter-spacing:1px}
.cd-s.hl .v{color:var(--red)}

/* Day grid */
.dgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
@media(max-width:520px){.dgrid{grid-template-columns:repeat(4,1fr)}}
.dc{background:var(--bg3);border:1px solid rgba(255,255,255,.03);border-radius:10px;padding:8px 5px;text-align:center;transition:all .15s;cursor:pointer;position:relative}
.dc:hover{background:rgba(255,255,255,.06)}
.dc.today{background:rgba(255,107,107,.12);border-color:rgba(255,107,107,.35)}
.dc.tmr{background:rgba(255,140,66,.08);border-color:rgba(255,140,66,.25)}
.dc.past{opacity:.35}
.dc-l{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:3px;color:var(--muted)}
.dc.today .dc-l{color:var(--red)}.dc.tmr .dc-l{color:var(--orange)}
.dc-i{font-size:15px;margin-bottom:3px}.dc-t{font-size:9px;font-weight:600;color:var(--white);line-height:1.2;min-height:22px}.dc-k{font-size:8px;color:var(--muted);margin-top:2px}
.dc .drag-handle{position:absolute;top:2px;right:4px;font-size:10px;color:rgba(255,255,255,.15);cursor:grab}

/* Session rows */
.sr{display:flex;gap:12px;align-items:flex-start;padding:11px 0;border-top:1px solid var(--faint);cursor:pointer;transition:background .12s;border-radius:8px;padding-left:4px;padding-right:4px}
.sr:hover{background:rgba(255,255,255,.03)}
.sr:first-child{border-top:none}
.si{width:40px;height:40px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.sm{flex:1;min-width:0}.sm-d{font-size:10px;color:var(--muted);font-weight:600}.sm-n{font-size:14px;font-weight:700;margin:2px 0}.sm-desc{font-size:12px;color:rgba(255,255,255,.45);line-height:1.4}

/* Plan rows */
.pr{display:grid;grid-template-columns:52px 1fr 80px 48px 56px;align-items:center;gap:6px;padding:9px 12px;border-radius:10px;cursor:pointer;transition:all .12s;border:1px solid transparent;font-size:12px}
@media(max-width:500px){.pr{grid-template-columns:44px 1fr 50px 44px}.pr .pr-dp{display:none}}
.pr:hover{background:rgba(255,255,255,.04)}
.pr.cur{background:rgba(255,107,107,.06);border-color:rgba(255,107,107,.18)}
.pr.sel{background:rgba(78,205,196,.1);border-color:rgba(78,205,196,.25)}
.pr.past{opacity:.35}
.pr-w{font-weight:700}.pr-p{font-weight:600;color:var(--white)}.pr-d{font-size:10px;color:var(--muted)}
.pr-bar{height:5px;border-radius:3px;background:rgba(255,255,255,.04);overflow:hidden}
.pr-bf{height:100%;border-radius:3px}
.pr-km{color:var(--teal);font-weight:600;text-align:right}
.pr-dp{color:var(--red);font-weight:600;text-align:right}

/* Drag reorder */
.drag-list{list-style:none}
.drag-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg3);border:1px solid var(--faint);border-radius:10px;margin-bottom:4px;cursor:grab;transition:all .15s}
.drag-item:active{cursor:grabbing;background:rgba(78,205,196,.08);border-color:rgba(78,205,196,.3);transform:scale(1.02)}
.drag-item .di-grip{color:var(--muted);font-size:16px;flex-shrink:0;user-select:none}
.drag-item .di-icon{font-size:18px;flex-shrink:0}
.drag-item .di-info{flex:1;min-width:0}
.drag-item .di-day{font-size:10px;color:var(--muted);font-weight:600}
.drag-item .di-title{font-size:13px;font-weight:600;color:var(--white)}
.drag-item .di-km{font-size:11px;color:var(--teal);flex-shrink:0}
.drag-item.drag-over{border-color:var(--teal);background:rgba(78,205,196,.06)}

/* Charts */
.cc{height:220px;margin-bottom:24px;position:relative}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px)}
.modal{background:var(--bg2);border:1px solid var(--faint);border-radius:16px;padding:22px;width:100%;max-width:440px;max-height:90vh;overflow-y:auto}
.modal h3{font-size:16px;font-weight:700;margin-bottom:14px;color:var(--white)}
.modal label{display:block;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:3px;margin-top:10px}
.modal input,.modal textarea,.modal select{width:100%;padding:9px 12px;border-radius:8px;border:1px solid var(--faint);background:var(--bg3);color:var(--white);font-size:14px;outline:none}
.modal input:focus,.modal textarea:focus{border-color:rgba(78,205,196,.4)}
.modal textarea{resize:vertical;min-height:50px}
.modal-btns{display:flex;gap:8px;margin-top:16px}
.btn{padding:10px 18px;border-radius:8px;border:none;font-size:13px;font-weight:600;transition:all .15s}
.btn-primary{background:var(--teal);color:#0d0d1a}.btn-primary:hover{background:#3dbdb5}
.btn-secondary{background:var(--bg3);color:var(--muted)}.btn-secondary:hover{background:var(--bg4)}
.btn-danger{background:rgba(255,107,107,.15);color:var(--red)}
.btn-sm{padding:6px 12px;font-size:11px}

/* Nutrition */
.ntabs{display:flex;gap:4px;margin-bottom:14px;flex-wrap:wrap}
.nt{padding:6px 12px;border-radius:8px;border:none;font-size:11px;font-weight:600;background:var(--bg3);color:var(--muted);transition:all .15s}
.nt.active{background:rgba(78,205,196,.18);color:var(--teal)}
.mgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
@media(max-width:420px){.mgrid{grid-template-columns:repeat(2,1fr)}}
.mc{border-radius:10px;padding:10px 6px;text-align:center}.mc .mv{font-size:20px;font-weight:800}.mc .ml{font-size:9px;color:var(--muted)}
.mbar{display:flex;gap:3px;height:8px;border-radius:4px;overflow:hidden;margin-bottom:14px}
.meal{background:var(--bg3);border:1px solid var(--faint);border-radius:10px;padding:12px;margin-bottom:5px}
.meal-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.meal-n{font-size:13px;font-weight:700}.meal-tm{font-size:11px;color:var(--muted);margin-left:6px}
.meal-kc{font-size:12px;font-weight:700;color:var(--orange)}
.meal-it{font-size:12px;color:rgba(255,255,255,.45);line-height:1.4;margin-bottom:4px}
.meal-ms{display:flex;gap:6px;flex-wrap:wrap}
.mt{font-size:9px;padding:2px 5px;border-radius:3px}
.mt.p{background:rgba(78,205,196,.12);color:var(--teal)}.mt.c{background:rgba(255,230,109,.12);color:var(--yellow)}.mt.f{background:rgba(255,107,107,.12);color:var(--red)}
.meal-alts{margin-top:6px;padding-top:6px;border-top:1px dashed rgba(255,255,255,.06)}
.meal-alt{font-size:11px;color:rgba(255,255,255,.3);line-height:1.5;padding-left:12px;position:relative}
.meal-alt::before{content:'↳';position:absolute;left:0;color:rgba(255,255,255,.15)}

/* Photo / upload zones */
.photo-zone{border:2px dashed rgba(78,205,196,.3);border-radius:14px;padding:24px;text-align:center;cursor:pointer;transition:all .2s;margin-bottom:14px}
.photo-zone:hover{border-color:var(--teal);background:rgba(78,205,196,.04)}
.photo-zone .pz-icon{font-size:36px;margin-bottom:6px}
.photo-zone .pz-text{font-size:13px;color:var(--muted)}
.photo-zone .pz-sub{font-size:11px;color:rgba(255,255,255,.2);margin-top:2px}
.photo-preview{max-width:100%;max-height:180px;border-radius:10px;margin:10px auto;display:block}
.analyzing{text-align:center;padding:16px;color:var(--teal);font-size:14px}
.spinner{display:inline-block;width:18px;height:18px;border:2px solid var(--teal);border-top-color:transparent;border-radius:50%;animation:spin .8s linear infinite;margin-right:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}

/* Journal */
.je{background:var(--bg3);border:1px solid var(--faint);border-radius:12px;padding:12px;margin-bottom:6px;display:flex;gap:10px;align-items:flex-start}
.je-img{width:55px;height:55px;border-radius:8px;object-fit:cover;flex-shrink:0}
.je-info{flex:1;min-width:0}.je-time{font-size:10px;color:var(--muted)}.je-name{font-size:13px;font-weight:700;margin:2px 0}
.je-macros{display:flex;gap:6px;flex-wrap:wrap;margin-top:3px}
.je-del{background:none;border:none;color:var(--muted);font-size:16px;padding:4px;cursor:pointer}.je-del:hover{color:var(--red)}
.dtotal{background:rgba(255,140,66,.08);border:1px solid rgba(255,140,66,.15);border-radius:12px;padding:12px;margin-bottom:14px;display:flex;justify-content:space-around;text-align:center}
.dtotal .dt-v{font-size:18px;font-weight:800}.dtotal .dt-l{font-size:9px;color:var(--muted);text-transform:uppercase}

/* Training log */
.log-entry{background:var(--bg3);border:1px solid var(--faint);border-radius:12px;padding:14px;margin-bottom:8px}
.log-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.log-date{font-size:11px;color:var(--muted)}.log-title{font-size:14px;font-weight:700}
.log-stats{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:6px}
.log-stat{font-size:11px;padding:3px 8px;border-radius:5px;background:var(--bg4)}
.log-notes{font-size:12px;color:rgba(255,255,255,.45);font-style:italic;margin-top:4px}
.rpe-bar{height:6px;border-radius:3px;background:var(--bg4);margin-top:6px;overflow:hidden}
.rpe-fill{height:100%;border-radius:3px}

/* Settings */
.notif-card{background:var(--bg3);border:1px solid var(--faint);border-radius:12px;padding:14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.notif-info{flex:1}.notif-title{font-size:14px;font-weight:600}.notif-desc{font-size:12px;color:var(--muted);margin-top:2px}
.toggle{position:relative;width:48px;height:26px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.toggle .slider{position:absolute;inset:0;background:rgba(255,255,255,.1);border-radius:13px;cursor:pointer;transition:.2s}
.toggle .slider::before{content:'';position:absolute;width:20px;height:20px;left:3px;bottom:3px;background:var(--muted);border-radius:50%;transition:.2s}
.toggle input:checked+.slider{background:rgba(78,205,196,.3)}
.toggle input:checked+.slider::before{transform:translateX(22px);background:var(--teal)}

/* Race rows */
.rr{display:grid;grid-template-columns:65px 1fr 55px 78px 50px;align-items:center;gap:6px;padding:7px 10px;background:var(--bg3);border-radius:8px;font-size:12px;margin-bottom:3px}
@media(max-width:500px){.rr{grid-template-columns:55px 1fr 50px}.rr .rd,.rr .rt{display:none}}

.hidden{display:none!important}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .25s ease}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="header">
    <div><div class="logo"><span class="r">Monte</span> <span class="b">Rosa</span></div><div class="subtitle">Training Hub</div></div>
    <div class="hinfo">SDV 120K • 8200m D+<br>17 juillet 2026</div>
  </div>
  <div id="content"></div>
</div>
<nav class="bnav"><div class="bnav-inner">
  <button onclick="go('dash')" id="nav-dash" class="active"><span class="bi">📋</span>Accueil</button>
  <button onclick="go('plan')" id="nav-plan"><span class="bi">🗓️</span>Plan</button>
  <button onclick="go('nutri')" id="nav-nutri"><span class="bi">🍽️</span>Nutrition</button>
  <button onclick="go('log')" id="nav-log"><span class="bi">📸</span>Logger</button>
  <button onclick="go('progress')" id="nav-progress"><span class="bi">📈</span>Progrès</button>
  <button onclick="go('settings')" id="nav-settings"><span class="bi">⚙️</span>Réglages</button>
</div></nav>

<script>
// ═══════════════════════════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════════════════════════
const RACE_DATE=new Date("2026-07-17T06:00:00");

const D=["mon","tue","wed","thu","fri","sat","sun"],DN=["Lun","Mar","Mer","Jeu","Ven","Sam","Dim"],DF=["Lundi","Mardi","Mercredi","Jeudi","Vendredi","Samedi","Dimanche"];
const SI={quality:"\u26A1",endurance:"\uD83C\uDFC3",long:"\uD83C\uDFD4\uFE0F",easy:"\uD83C\uDF3F",gym:"\uD83D\uDCAA",cross:"\uD83C\uDFBE",vertical:"\u26F0\uFE0F",rest:"\uD83D\uDE34",race:"\uD83D\uDD25"};
const SC={quality:"#FF6B6B",endurance:"#4ECDC4",long:"#FF8C42",easy:"#95E1D3",gym:"#C3ACD0",cross:"#FFE66D",vertical:"#A8D8EA",rest:"#666",race:"#FF4757"};
const TYPES=["quality","endurance","long","easy","gym","cross","vertical","rest","race"];

const DEFAULT_PLAN=[
  {week:"W14",dates:"30/03 – 05/04",phase:"Build 1",color:"#4ECDC4",mon:{type:"gym",title:"PT: Fessiers/Hanche",desc:"Squats bulgares, ponts fessiers, clams, stabilité hanche",km:0,dplus:0},tue:{type:"quality",title:"9km : 8×400m @ 4:00",desc:"Échauffement 2km, 8×400m récup 90s, retour calme",km:9,dplus:30},wed:{type:"endurance",title:"10km Z2",desc:"Allure facile ~5:30-6:00/km, FC < 145bpm",km:10,dplus:20},thu:{type:"cross",title:"Tennis + 6km Z2",desc:"Tennis 1h puis footing léger",km:6,dplus:15},fri:{type:"vertical",title:"45' Stairmaster (600m D+)",desc:"Intensité modérée, focus posture et poussée",km:0,dplus:600},sat:{type:"long",title:"16km Vallonné",desc:"Hampstead Heath ou Highgate",km:16,dplus:250},sun:{type:"easy",title:"6km Z2",desc:"Récupération active",km:6,dplus:15},target_km:47,target_dplus:1000},

// Helpers
function daysLeft(){return Math.ceil((RACE_DATE-new Date())/864e5)}
function curWeekIdx(){const n=new Date();for(let i=plan.length-1;i>=0;i--){const p=plan[i].dates.split(" – ")[0].split("/");if(n>=new Date(2026,parseInt(p[1])-1,parseInt(p[0])))return i}return 0}
function wKm(w){return D.reduce((s,d)=>s+(w[d]?.km||0),0)}
function wDp(w){return D.reduce((s,d)=>s+(w[d]?.dplus||0),0)}
function todayIdx(){const d=new Date().getDay();return d===0?6:d-1}
function dateStr(){return new Date().toISOString().split('T')[0]}
function go(tab){currentTab=tab;document.querySelectorAll('.bnav button').forEach(b=>b.classList.remove('active'));document.getElementById('nav-'+tab)?.classList.add('active');render()}

function render(){
  const el=document.getElementById('content');
  Object.values(charts).forEach(c=>{try{c.destroy()}catch{}});charts={};
  const renderers={dash:renderDash,plan:renderPlan,nutri:renderNutri,log:renderLog,progress:renderProgress,settings:renderSettings};
  el.innerHTML=(renderers[currentTab]||renderDash)();
  if(currentTab==='progress')initCharts();
}

// ─── REORDER MODAL ──────────────────────────────────────────
function startReorder(weekId){
  const wi=plan.findIndex(w=>w.week===weekId);if(wi<0)return;
  const w=plan[wi];
  const modal=document.createElement('div');modal.className='modal-bg';
  let items=D.map((d,i)=>{const s=w[d];return`<div class="drag-item" draggable="true" data-day="${d}">
    <span class="di-grip">⠿</span><span class="di-icon">${SI[s?.type]||'📋'}</span>
    <div class="di-info"><div class="di-day">${DF[i]}</div><div class="di-title">${s?.title||'Repos'}</div></div>
    ${s?.km?`<span class="di-km">${s.km}km</span>`:''}</div>`}).join('');
  modal.innerHTML=`<div class="modal"><h3>↕️ Réagencer ${w.week}</h3>
    <div style="font-size:12px;color:var(--muted);margin-bottom:12px">Glisse les séances pour les réorganiser. L'ordre du haut = Lundi.</div>
    <div id="reorder-list">${items}</div>
    <div class="modal-btns"><button class="btn btn-primary" onclick="saveReorder('${weekId}')">Appliquer</button>
    <button class="btn btn-secondary" onclick="closeModal()">Annuler</button></div></div>`;
  modal.addEventListener('click',e=>{if(e.target===modal)closeModal()});
  document.body.appendChild(modal);editModal=modal;
  // Init drag
  setTimeout(()=>{
    const list=document.getElementById('reorder-list');if(!list)return;
    let dragEl=null;
    list.querySelectorAll('.drag-item').forEach(item=>{
      item.addEventListener('dragstart',e=>{dragEl=item;item.style.opacity='.5';e.dataTransfer.effectAllowed='move'});
      item.addEventListener('dragend',()=>{dragEl.style.opacity='1';list.querySelectorAll('.drag-item').forEach(i=>i.classList.remove('drag-over'))});
      item.addEventListener('dragover',e=>{e.preventDefault();e.dataTransfer.dropEffect='move';item.classList.add('drag-over')});
      item.addEventListener('dragleave',()=>item.classList.remove('drag-over'));
      item.addEventListener('drop',e=>{e.preventDefault();item.classList.remove('drag-over');if(dragEl!==item)list.insertBefore(dragEl,item)});
    });
    // Touch support
    let touchEl=null,touchClone=null;
    list.addEventListener('touchstart',e=>{
      const item=e.target.closest('.drag-item');if(!item)return;
      touchEl=item;touchEl.style.opacity='.6';
    },{passive:true});
    list.addEventListener('touchmove',e=>{if(!touchEl)return;
      const touch=e.touches[0];const el=document.elementFromPoint(touch.clientX,touch.clientY)?.closest('.drag-item');
      list.querySelectorAll('.drag-item').forEach(i=>i.classList.remove('drag-over'));
      if(el&&el!==touchEl)el.classList.add('drag-over');
    },{passive:true});
    list.addEventListener('touchend',e=>{if(!touchEl)return;
      const over=list.querySelector('.drag-over');
      if(over&&over!==touchEl)list.insertBefore(touchEl,over);
      touchEl.style.opacity='1';list.querySelectorAll('.drag-item').forEach(i=>i.classList.remove('drag-over'));touchEl=null;
    });
  },50);
}
function saveReorder(weekId){
  const wi=plan.findIndex(w=>w.week===weekId);if(wi<0)return;
  const list=document.getElementById('reorder-list');if(!list)return;
  const items=[...list.querySelectorAll('.drag-item')];
  const oldSessions=D.map(d=>plan[wi][d]);
  const newOrder=items.map(item=>item.dataset.day);
  const reordered=newOrder.map(od=>plan[wi][od]);
  D.forEach((d,i)=>{plan[wi][d]=reordered[i]});
  savePlan();closeModal();render();
}

    const resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:500,messages:[{role:'user',content}]})});
    const data=await resp.json(),text=data.content?.map(c=>c.text||'').join('')||'';
    const result=JSON.parse(text.replace(/```json|```/g,'').trim());
    // Show pre-filled form
    showLogForm(result);
  }catch(err){resEl.innerHTML=`<div style="color:var(--red);text-align:center;padding:12px">Erreur d'analyse. <button class="btn btn-primary btn-sm" onclick="manualLog()">Saisie manuelle</button></div>`}
  input.value='';
}
function showLogForm(pre={}){
  const m=document.createElement('div');m.className='modal-bg';
  m.innerHTML=`<div class="modal"><h3>📝 Logger l'entraînement</h3>
    <label>Titre</label><input id="lg-t" value="${(pre.title||'').replace(/"/g,'&quot;')}">
    <label>Distance (km)</label><input id="lg-km" type="number" step="0.1" value="${pre.km||''}">
    <label>Durée</label><input id="lg-dur" value="${pre.duration||''}" placeholder="1h 30min">
    <label>D+ (m)</label><input id="lg-dp" type="number" value="${pre.dplus||''}">
    <label>FC moyenne (bpm)</label><input id="lg-hr" type="number" value="${pre.hr||''}">
    <label>Pace moyen</label><input id="lg-pace" value="${pre.pace||''}" placeholder="5:30">
    <label>Cadence (spm)</label><input id="lg-cad" type="number" value="${pre.cadence||''}">
    <label>RPE (effort perçu 1-10)</label><input id="lg-rpe" type="range" min="1" max="10" value="5" oninput="document.getElementById('rpe-val').textContent=this.value">
    <div style="text-align:center;font-size:18px;font-weight:800;color:var(--orange)" id="rpe-val">5</div>
    <label>Notes / Sensations</label><textarea id="lg-notes" placeholder="Comment tu t'es senti? Météo? Problèmes?"></textarea>
    <div class="modal-btns"><button class="btn btn-primary" onclick="saveLogEntry()">Enregistrer</button>
    <button class="btn btn-secondary" onclick="closeModal()">Annuler</button></div></div>`;
  m.addEventListener('click',e=>{if(e.target===m)closeModal()});document.body.appendChild(m);editModal=m;
}
function manualLog(){showLogForm()}
function saveLogEntry(){
  trainingLog.push({date:dateStr(),time:new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}),
    title:document.getElementById('lg-t').value||'Entraînement',
    km:parseFloat(document.getElementById('lg-km').value)||null,
    duration:document.getElementById('lg-dur').value||null,
    dplus:parseInt(document.getElementById('lg-dp').value)||null,
    hr:parseInt(document.getElementById('lg-hr').value)||null,
    pace:document.getElementById('lg-pace').value||null,
    cadence:parseInt(document.getElementById('lg-cad').value)||null,
    rpe:parseInt(document.getElementById('lg-rpe').value)||null,
    notes:document.getElementById('lg-notes').value||null});
  saveLog();closeModal();render();
}
function delLog(i){trainingLog.splice(i,1);saveLog();render()}

// ─── PROGRESS ───────────────────────────────────────────────
function renderProgress(){
  let h=`<div class="sl t">Volume hebdomadaire — Historique Strava</div><div class="cc"><canvas id="ch1"></canvas></div>
    <div class="sl o">Progression planifiée</div><div class="cc"><canvas id="ch2"></canvas></div>
    <div class="sl p" style="margin-top:8px">Palmarès Ultra</div>`;
  RACES.forEach(r=>{h+=`<div class="rr"><span style="color:var(--muted)">${r.date}</span><span style="color:var(--white);font-weight:600">${r.name}</span>
    <span style="color:var(--teal)">${r.km}km</span><span class="rd" style="color:var(--red)">${r.dp}m D+</span><span class="rt" style="color:var(--muted)">${r.time}</span></div>`});
  return h;
}
function initCharts(){
  const ctx1=document.getElementById('ch1')?.getContext('2d'),ctx2=document.getElementById('ch2')?.getContext('2d');if(!ctx1||!ctx2)return;
  const o={responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'rgba(255,255,255,.4)',font:{size:10}}}},
    scales:{x:{ticks:{color:'rgba(255,255,255,.25)',font:{size:9},maxRotation:45},grid:{color:'rgba(255,255,255,.04)'}},
    y:{ticks:{color:'rgba(255,255,255,.3)',font:{size:10}},grid:{color:'rgba(255,255,255,.04)'}}}};
  charts.h=new Chart(ctx1,{type:'bar',data:{labels:HIST.map(h=>h.w),datasets:[
    {label:'km',data:HIST.map(h=>h.km),backgroundColor:'rgba(78,205,196,.6)',borderRadius:3,order:2},
    {label:'D+',data:HIST.map(h=>h.dp),type:'line',borderColor:'#FF6B6B',borderWidth:2,pointRadius:0,tension:.3,order:1,yAxisID:'y1'}]},
    options:{...o,scales:{...o.scales,y1:{position:'right',ticks:{color:'rgba(255,107,107,.4)',font:{size:10}},grid:{display:false}}}}});
  const pd=plan.map(w=>({l:w.week,km:wKm(w),dp:wDp(w)}));
  charts.p=new Chart(ctx2,{type:'bar',data:{labels:pd.map(d=>d.l),datasets:[
    {label:'km',data:pd.map(d=>d.km),backgroundColor:'rgba(78,205,196,.7)',borderRadius:3},
    {label:'D+',data:pd.map(d=>d.dp),backgroundColor:'rgba(255,107,107,.5)',borderRadius:3}]},options:o});
}

// ─── SETTINGS ───────────────────────────────────────────────
function renderSettings(){
  return`<div class="sl t">Notifications</div>
    <div class="notif-card"><div class="notif-info"><div class="notif-title">Rappel quotidien</div>
      <div class="notif-desc">Entraînement du lendemain chaque soir</div></div>
      <label class="toggle"><input type="checkbox" ${notifSettings.daily?'checked':''} onchange="toggleNotif('daily',this.checked)"><span class="slider"></span></label></div>
    <div class="notif-card"><div class="notif-info"><div class="notif-title">Résumé hebdo</div>
      <div class="notif-desc">Programme de la semaine chaque lundi</div></div>
      <label class="toggle"><input type="checkbox" ${notifSettings.weekly?'checked':''} onchange="toggleNotif('weekly',this.checked)"><span class="slider"></span></label></div>
    <div class="notif-card"><div class="notif-info"><div class="notif-title">Heure du rappel</div></div>
      <input type="time" value="${notifSettings.time}" onchange="notifSettings.time=this.value;saveNotif()"
        style="background:var(--bg3);border:1px solid var(--faint);color:var(--white);border-radius:8px;padding:8px 12px;font-size:14px;width:auto"></div>
    <div id="notif-status" style="margin-top:8px;font-size:11px;color:var(--muted);text-align:center"></div>
    <div class="sl r" style="margin-top:24px">Données</div>
    <div class="notif-card"><div class="notif-info"><div class="notif-title">Reset plan</div><div class="notif-desc">Valeurs par défaut</div></div>
      <button class="btn btn-danger btn-sm" onclick="if(confirm('Reset le plan?')){plan=JSON.parse(JSON.stringify(DEFAULT_PLAN));savePlan();render()}">Reset</button></div>
    <div class="notif-card"><div class="notif-info"><div class="notif-title">Vider journal nutrition</div></div>
      <button class="btn btn-danger btn-sm" onclick="if(confirm('Vider?')){journal=[];saveJournal();render()}">Vider</button></div>
    <div class="notif-card"><div class="notif-info"><div class="notif-title">Vider log entraînement</div></div>
      <button class="btn btn-danger btn-sm" onclick="if(confirm('Vider?')){trainingLog=[];saveLog();render()}">Vider</button></div>
    <div style="text-align:center;margin-top:28px;font-size:11px;color:rgba(255,255,255,.15)">Monte Rosa Training Hub v3.0 — PWA</div>`;
}
async function toggleNotif(type,val){
  notifSettings[type]=val;saveNotif();
  if(val&&'Notification' in window&&Notification.permission!=='granted'){
    const p=await Notification.requestPermission();if(p!=='granted'){notifSettings[type]=false;saveNotif();render();return}}
  const s=document.getElementById('notif-status');if(s)s.textContent=val?'✓ Notifications activées':'Désactivées';
  scheduleNotifications();
}
function scheduleNotifications(){
  if(!('serviceWorker' in navigator)||!notifSettings.daily)return;
  navigator.serviceWorker.ready.then(reg=>{
    const ci=curWeekIdx(),cw=plan[ci],ti=todayIdx(),tmr=ti+1<7?ti+1:0,s=cw[D[tmr]];
    if(!s)return;const[h,m]=(notifSettings.time||'20:00').split(':').map(Number);
    const target=new Date();target.setHours(h,m,0,0);let delay=target-new Date();if(delay<0)delay+=864e5;
    reg.active?.postMessage({type:'SCHEDULE_NOTIFICATION',title:'🏔️ Demain: '+s.title,body:DF[tmr]+' — '+s.desc+(s.km?' • '+s.km+'km':''),delay});
  });
}

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════
if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js').catch(console.error);
render();scheduleNotifications();
</script></body></html>
